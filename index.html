<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous CRT Terminal</title>
<style>
body {
  margin: 0;
  background: #000;
  color: #0f0;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  line-height: 1.4em;
  overflow: hidden;
  text-shadow: 0 0 2px #0f0, 0 0 5px #0f0;
}

#terminal {
  padding: 20px;
  white-space: pre-wrap;
  height: 100vh;
  overflow-y: hidden;
  animation: flicker 0.1s infinite;
}

@keyframes flicker {
  0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
  20%,22%,24%,55% { opacity: 0.8; }
}

.cursor {
  display: inline-block;
  width: 10px;
  background-color: #0f0;
  margin-left: 2px;
  animation: blink 1s step-start infinite;
}

@keyframes blink {
  50% { background-color: transparent; }
}

body::after {
  content: '';
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: repeating-linear-gradient(
    rgba(0,255,0,0.05) 0 1px,
    transparent 1px 2px
  );
  pointer-events: none;
}

.glitch {
  display: inline-block;
  animation: glitchShift 0.2s infinite;
}

@keyframes glitchShift {
  0%,20%,40%,60%,80%,100% { transform: translate(0px, 0px); }
  10% { transform: translate(-1px, 0px); }
  30% { transform: translate(1px, 0px); }
  50% { transform: translate(-2px, 0px); }
  70% { transform: translate(2px, 0px); }
  90% { transform: translate(-1px, 0px); }
}
</style>
</head>
<body>
<div id="terminal"></div>
<script>
const terminal = document.getElementById("terminal");

const bootLines = [
  "ANONYMOUS CRT TERMINAL v2.0",
  "Initializing virtual phosphor...",
  "Loading hacker modules...",
  "Decrypting comms... [OK]",
  "Mission logs ready.",
  "System ready. Operator, welcome."
];

const commands = [
  {label: "PROFILE", action: "https://github.com/wrathfulDiety"},
  {label: "BLOG", action: "https://hasanka-amarasinghe.medium.com/"},
  {label: "CVE", action: "https://www.cve.org/Search?search=CVE-2025-52357"},
];

const missionLogs = [
  "Scanning 10.0.0.* ...",
  "Enumerating endpoints...",
  "Injecting payload...",
  "Bypassing firewall rules...",
  "Analyzing session tokens...",
  "Privilege escalation detected...",
  "Randomizing packet streams...",
  "Logging network traffic...",
  "Static interference detected...",
  "Phosphor decay simulation..."
];

function typeLine(text, callback, speed=40) {
  let i = 0;
  const interval = setInterval(() => {
    let char = text.charAt(i);
    if(Math.random() < 0.02) char = String.fromCharCode(33 + Math.random()*94);
    const span = document.createElement("span");
    span.textContent = char;
    if(Math.random() < 0.05) span.className = "glitch";
    terminal.appendChild(span);
    i++;
    terminal.scrollTop = terminal.scrollHeight;
    if(i === text.length) {
      clearInterval(interval);
      terminal.appendChild(document.createElement("br"));
      callback();
    }
  }, speed);
}

function bootSequence(index) {
  if(index < bootLines.length) {
    typeLine(bootLines[index], () => bootSequence(index + 1));
  } else {
    initCommands();
  }
}

function initCommands() {
  terminal.appendChild(document.createElement("br"));
  terminal.innerHTML += "Available Commands:\n";
  commands.forEach(cmd => {
    const span = document.createElement("span");
    span.className = "cmd-link glitch";
    span.textContent = `[${cmd.label}] `;
    span.onclick = () => window.open(cmd.action, "_blank");
    terminal.appendChild(span);
  });
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  terminal.appendChild(cursor);
  startMissionLogs();
}

function startMissionLogs() {
  setInterval(() => {
    const log = missionLogs[Math.floor(Math.random()*missionLogs.length)];
    typeLine("> " + log, ()=>{}, 25);
  }, 3000);
}

bootSequence(0);
</script>
</body>
</html>
