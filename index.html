<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Terminal Announcement</title>
<style>
/* Basic Body & CRT Look */
body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff00;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  overflow: hidden;
  text-shadow: 0 0 2px #0f0, 0 0 5px #0f0;
  position: relative;
}

/* Background Guy Fawkes Mask */
#mask {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 900px;
  height: auto;
  transform: translate(-50%, -50%);
  opacity: 0.08;
  pointer-events: none;
  mix-blend-mode: lighten;
  animation: maskFlicker 4s infinite;
}

@keyframes maskFlicker {
  0%,50%,100% { opacity: 0.08; }
  25% { opacity: 0.12; }
  75% { opacity: 0.05; }
}

/* Terminal Container */
#terminal {
  padding: 20px;
  white-space: pre-wrap;
  height: 100vh;
  overflow-y: hidden;
  animation: flicker 0.15s infinite;
  position: relative;
  z-index: 1;
}

@keyframes flicker {
  0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
  20%,22%,24%,55% { opacity: 0.85; }
}

/* Cursor */
.cursor {
  display: inline-block;
  width: 10px;
  background-color: #0f0;
  margin-left: 2px;
  animation: blink 1s step-start infinite;
}

@keyframes blink { 50% { background-color: transparent; } }

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: repeating-linear-gradient(
    rgba(0,255,0,0.05) 0 1px,
    transparent 1px 2px
  );
  pointer-events: none;
}

/* Glitch effect on letters */
.glitch {
  display: inline-block;
  animation: glitchShift 0.2s infinite;
}

@keyframes glitchShift {
  0%,20%,40%,60%,80%,100% { transform: translate(0,0); }
  10% { transform: translate(-1px, 0); }
  30% { transform: translate(1px, 0); }
  50% { transform: translate(-2px, 0); }
  70% { transform: translate(2px, 0); }
  90% { transform: translate(-1px, 0); }
}

/* Links highlight */
.cmd-link { cursor: pointer; color: #0f0; text-decoration: underline; }
</style>
</head>
<body>

<img id="mask" src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Guy_Fawkes_Mask.svg" alt="Anonymous Mask"/>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

// Boot/Intro lines
const introLines = [
  "██████╗ ██████╗  █████╗ ███████╗██╗   ██╗ █████╗ ███╗   ██╗",
  "██╔══██╗██╔══██╗██╔══██╗██╔════╝██║   ██║██╔══██╗████╗  ██║",
  "██████╔╝██████╔╝███████║███████╗██║   ██║███████║██╔██╗ ██║",
  "██╔═══╝ ██╔═══╝ ██╔══██║╚════██║╚██╗ ██╔╝██╔══██║██║╚██╗██║",
  "██║     ██║     ██║  ██║███████║ ╚████╔╝ ██║  ██║██║ ╚████║",
  "╚═╝     ╚═╝     ╚═╝  ╚═╝╚══════╝  ╚═══╝  ╚═╝  ╚═╝╚═╝  ╚═══╝",
  "ANONYMOUS TERMINAL LAUNCHING...",
  "Decrypting comms... [OK]",
  "System ready. Operator, welcome."
];

// Links as commands
const commands = [
  {label: "PROFILE", action: "https://github.com/wrathfulDiety"},
  {label: "BLOG", action: "https://hasanka-amarasinghe.medium.com/"},
  {label: "CVE-52357", action: "https://www.cve.org/CVERecord?id=CVE-2025-52357"},
  {label: "CVE-56311", action: "https://www.cve.org/CVERecord?id=CVE-2025-56311"}
];

// Random mission logs
const logs = [
  "Scanning 10.0.0.* ...",
  "Enumerating endpoints...",
  "Injecting payload...",
  "Bypassing firewall rules...",
  "Analyzing session tokens...",
  "Privilege escalation detected...",
  "Randomizing packet streams...",
  "Logging network traffic...",
  "Static interference detected..."
];

// Typewriter effect
function typeLine(text, callback, speed=40){
  let i=0;
  const interval = setInterval(()=>{
    let char = text.charAt(i);
    if(Math.random()<0.02) char = String.fromCharCode(33+Math.random()*94);
    const span = document.createElement("span");
    span.textContent = char;
    if(Math.random()<0.05) span.className = "glitch";
    terminal.appendChild(span);
    i++;
    terminal.scrollTop = terminal.scrollHeight;
    if(i===text.length){
      clearInterval(interval);
      terminal.appendChild(document.createElement("br"));
      callback();
    }
  }, speed);
}

function runIntro(index){
  if(index<introLines.length){
    typeLine(introLines[index], ()=>runIntro(index+1));
  } else {
    showCommands();
  }
}

function showCommands(){
  terminal.appendChild(document.createElement("br"));
  terminal.innerHTML += "AVAILABLE COMMANDS:\n";
  commands.forEach(cmd=>{
    const span = document.createElement("span");
    span.className = "cmd-link glitch";
    span.textContent = `[${cmd.label}] `;
    span.onclick = ()=>window.open(cmd.action,"_blank");
    terminal.appendChild(span);
  });
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  terminal.appendChild(cursor);
  startLogs();
}

function startLogs(){
  setInterval(()=>{
    const log = logs[Math.floor(Math.random()*logs.length)];
    typeLine("> " + log, ()=>{}, 25);
  }, 3000);
}

// Start the sequence
runIntro(0);
</script>

</body>
</html>
