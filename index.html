<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RudraForge CRT Terminal</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.3em;
    overflow: hidden;
    text-shadow: 0 0 2px #0f0, 0 0 5px #0f0;
  }

  #terminal {
    padding: 20px;
    white-space: pre-wrap;
    height: 100vh;
    overflow-y: hidden;
    position: relative;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 22%, 24%, 55% { opacity: 0.85; }
  }

  .cursor {
    display: inline-block;
    width: 10px;
    background-color: #0f0;
    margin-left: 2px;
    animation: blink 1s step-start infinite;
  }

  @keyframes blink {
    50% { background-color: transparent; }
  }

  .cmd-link {
    color: #0f0;
    text-decoration: underline;
    cursor: pointer;
  }

  .cmd-link:hover {
    color: #aff;
  }

  /* scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      rgba(0,255,0,0.05) 0 1px,
      transparent 1px 2px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="terminal"></div>
<script>
const terminal = document.getElementById("terminal");

const bootLines = [
  "CRT BIOS v1.3 initializing...",
  "Phosphor tube check: [OK]",
  "Loading telemetry modules...",
  "Encrypting comms... [OK]",
  "Loading user profile: WrathfulDiety",
  "Mission logs synchronized",
  "Pentesting suite online",
  "System ready. Commander, welcome."
];

const banner = `
‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ
‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ ‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  
‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  
‚Ėą‚Ėą‚ēĎ     ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
‚ēö‚ēź‚ēĚ      ‚ēö‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ
`;

const commands = [
  {label: "WHOAMI", action: "https://github.com/wrathfulDiety"},
  {label: "TOOLS", action: "https://wrathfuldiety.github.io/RudraForge/tools.html"},
  {label: "CVE", action: "https://www.cve.org/Search?search=CVE-2025-52357"},
  {label: "BLOG", action: "https://hasanka-amarasinghe.medium.com/"},
];

const missionLogs = [
  "Scanning network 192.168.*.* ...",
  "Identifying open ports...",
  "Enumerating endpoints...",
  "Fetching CVE details...",
  "Simulating payload delivery...",
  "Checking WAF rules...",
  "Privilege escalation tests running...",
  "Analyzing HTTP responses...",
  "Logging session tokens...",
  "Validating encryption routines..."
];

function typeLine(text, callback, speed=40) {
  let i = 0;
  const interval = setInterval(() => {
    terminal.innerHTML += text.charAt(i);
    i++;
    terminal.scrollTop = terminal.scrollHeight;
    if (i === text.length) {
      clearInterval(interval);
      terminal.innerHTML += "\n";
      callback();
    }
  }, speed);
}

function bootSequence(index) {
  if(index < bootLines.length) {
    typeLine(bootLines[index], () => bootSequence(index + 1));
  } else {
    typeLine(banner + "\n\n", initCommands);
  }
}

function initCommands() {
  terminal.innerHTML += "Available Commands:\n";
  commands.forEach(cmd => terminal.innerHTML += `[${cmd.label}] `);
  terminal.innerHTML += "\n\nClick command to open link:\n";
  commands.forEach(cmd => {
    const span = document.createElement("span");
    span.className = "cmd-link";
    span.textContent = `[${cmd.label}] `;
    span.onclick = () => window.open(cmd.action, "_blank");
    terminal.appendChild(span);
  });
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  terminal.appendChild(cursor);

  startMissionLogs();
}

// Random logs with flicker effect
function startMissionLogs() {
  setInterval(() => {
    const log = missionLogs[Math.floor(Math.random() * missionLogs.length)];
    typeLine("> " + log, ()=>{}, 25);
  }, 3500);
}

// Start
bootSequence(0);
</script>
</body>
</html>
