<!DOCTYPE html>
<html>

<head>

<title>WrathfulDiety Terminal</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
}

.terminal{

max-width:900px;
margin:auto;
padding:40px;

}

h1{
color:#00ff9c;
text-shadow:0 0 10px #00ff9c;
}

#output{
margin-top:20px;
white-space:pre-line;
}

.input-line{
display:flex;
margin-top:10px;
}

.prompt{
margin-right:10px;
}

input{

background:black;
border:none;
color:#00ff9c;
font-family:monospace;
font-size:16px;
outline:none;
width:100%;

}

.link{

color:#00ff9c;
text-decoration:none;

}

</style>

</head>

<body>

<div class="terminal">

<h1>WrathfulDiety Security Terminal</h1>

<div>
Type <b>help</b> to see available commands
</div>

<div id="output"></div>

<div class="input-line">

<div class="prompt">></div>

<input id="command" autofocus>

</div>

</div>

<script>

const output=document.getElementById("output");
const input=document.getElementById("command");

function print(text){
output.innerHTML += text + "\n\n";
}

function run(cmd){

cmd=cmd.toLowerCase();

if(cmd==="help"){

print(`Available commands:

about      - about the researcher
tools      - security tools
cve        - vulnerability research
blog       - medium articles
contact    - contact info
clear      - clear terminal`);

}

else if(cmd==="about"){

print(`Cybersecurity Engineer from Sri Lanka.

Specializing in:

• Penetration Testing
• Application Security
• Red Team Operations
• Bug Bounty Hunting

Focus areas include web application security and vulnerability research.`);

}

else if(cmd==="tools"){

print(`Security Tools

RudraForge
Country-specific username/email generator for pentesting

Launch:
https://wrathfuldiety.github.io/RudraForge/`);

}

else if(cmd==="cve"){

print(`Published CVEs

CVE-2025-52357
Reflected XSS in FiberHome FD602GW-DX-R410 router

CVE-2025-56311
CSRF vulnerability allowing remote reboot

More details:
https://www.cve.org/`);

}

else if(cmd==="blog"){

print(`Security Articles

https://hasanka-amarasinghe.medium.com`);

}

else if(cmd==="contact"){

print(`LinkedIn

https://linkedin.com/in/hasanka-amarasinghe`);

}

else if(cmd==="clear"){

output.innerHTML="";

}

else{

print("Command not found. Type 'help'.");

}

}

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value;

print("> " + cmd);

run(cmd);

input.value="";

}

});

</script>

</body>

</html>
