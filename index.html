<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RudraForge Terminal</title>
<style>
  /* CRT Terminal base */
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.2em;
    overflow: hidden;
  }

  /* Scanlines */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      rgba(0,255,0,0.05) 0 1px,
      transparent 1px 2px
    );
    z-index: 2;
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 10px;
    background-color: #0f0;
    margin-left: 2px;
    animation: blink 1s step-start infinite;
  }

  @keyframes blink {
    50% { background-color: transparent; }
  }

  /* Terminal container */
  #terminal {
    padding: 20px;
    white-space: pre-wrap;
    height: 100vh;
    overflow-y: auto;
    box-sizing: border-box;
  }

  /* Command links */
  .cmd-link {
    color: #0f0;
    text-decoration: underline;
    cursor: pointer;
  }

  .cmd-link:hover {
    color: #aff;
  }

</style>
</head>
<body>
<div id="terminal"></div>
<script>
// Boot sequence lines
const bootLines = [
  "Initializing NASA Terminal v1.9...",
  "Loading telemetry modules...",
  "Running pre-flight security checks...",
  "Encrypting comms... [OK]",
  "Loading user profile: WrathfulDiety",
  "Mission logs synchronized",
  "Pentesting suite initialized...",
  "System ready. Welcome, Commander."
];

// ASCII banner for fun
const banner = `
██████╗ ██╗    ██╗██████╗ ██████╗  █████╗ ███████╗███████╗
██╔══██╗██║    ██║██╔══██╗██╔══██╗██╔══██╗██╔════╝██╔════╝
██████╔╝██║ █╗ ██║██████╔╝██████╔╝███████║███████╗█████╗  
██╔═══╝ ██║███╗██║██╔═══╝ ██╔═══╝ ██╔══██║╚════██║██╔══╝  
██║     ╚███╔███╔╝██║     ██║     ██║  ██║███████║███████╗
╚═╝      ╚══╝╚══╝ ╚═╝     ╚═╝     ╚═╝  ╚═╝╚══════╝╚══════╝
`;

const terminal = document.getElementById("terminal");
let lineIndex = 0;

// Print boot sequence line by line
function typeLine(text, callback) {
  let i = 0;
  const interval = setInterval(() => {
    terminal.innerHTML += text.charAt(i);
    i++;
    terminal.scrollTop = terminal.scrollHeight;
    if (i === text.length) {
      clearInterval(interval);
      terminal.innerHTML += "\n";
      callback();
    }
  }, 40);
}

// Sequentially print lines
function bootSequence(index) {
  if(index < bootLines.length) {
    typeLine(bootLines[index], () => bootSequence(index + 1));
  } else {
    typeLine(banner + "\n\n", initCommands);
  }
}

// Commands
const commands = [
  {label: "WHOAMI", action: "https://github.com/wrathfulDiety"},
  {label: "TOOLS", action: "https://wrathfuldiety.github.io/RudraForge/tools.html"},
  {label: "CVE", action: "https://www.cve.org/Search?search=CVE-2025-52357"},
  {label: "BLOG", action: "https://hasanka-amarasinghe.medium.com/"},
];

// Print interactive commands
function initCommands() {
  terminal.innerHTML += "Available Commands:\n";
  commands.forEach(cmd => {
    terminal.innerHTML += `[${cmd.label}] `;
  });
  terminal.innerHTML += "\n\nClick command to open link:\n";
  // Create clickable commands
  commands.forEach(cmd => {
    const span = document.createElement("span");
    span.className = "cmd-link";
    span.textContent = `[${cmd.label}] `;
    span.onclick = () => window.open(cmd.action, "_blank");
    terminal.appendChild(span);
  });
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  terminal.appendChild(cursor);
}

// Start boot
bootSequence(0);

</script>
</body>
</html>
